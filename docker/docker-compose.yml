services:
  schrevind:
    image: schrevind:latest
    container_name: schrevind
    restart: unless-stopped

    ports:
      - "8080:8080"

    volumes:
      # Config
      - ./config.yaml:/config/config.yaml:ro

      # SQLite database directory
      - ./data:/app/data

    environment:
      # optional, but usually useful
      TZ: Europe/Berlin

    # serve is already default via Dockerfile
    # command: ["serve"]


